name: Android Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v0.9.0-alpha2
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Validate release input
        id: release_input
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z]+[0-9]*)?$ ]]; then
            echo "Unsupported tag format: ${TAG_NAME}"
            echo "Expected format: vMAJOR.MINOR.PATCH[-alphaN|-betaN|-rcN]"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Capture source commit author
        id: source_commit
        shell: bash
        run: |
          set -euo pipefail

          echo "author_name=$(git log -1 --format=%an)" >> "$GITHUB_OUTPUT"
          echo "author_email=$(git log -1 --format=%ae)" >> "$GITHUB_OUTPUT"

      - name: Bump app version
        id: bump_version
        shell: bash
        env:
          TAG_NAME: ${{ steps.release_input.outputs.tag_name }}
        run: |
          set -euo pipefail

          current_version_code="$(sed -n 's/.*versionCode = \([0-9]\+\).*/\1/p' app/build.gradle | head -n 1)"
          current_version_name="$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle | head -n 1)"

          if [[ -z "$current_version_code" || -z "$current_version_name" ]]; then
            echo "Could not resolve current app version from app/build.gradle"
            exit 1
          fi

          next_version_code=$((current_version_code + 1))

          perl -0pi -e "s/versionCode = \\d+/versionCode = $next_version_code/; s/versionName = \".*?\"/versionName = \"$TAG_NAME\"/;" app/build.gradle

          git add app/build.gradle

          if git diff --cached --quiet; then
            echo "No version changes were staged"
            exit 1
          fi

          echo "version_code=$next_version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create release commit with copied author
        id: release_commit
        shell: bash
        env:
          AUTHOR_NAME: ${{ steps.source_commit.outputs.author_name }}
          AUTHOR_EMAIL: ${{ steps.source_commit.outputs.author_email }}
        run: |
          set -euo pipefail

          GIT_AUTHOR_NAME="$AUTHOR_NAME" \
          GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL" \
          GIT_COMMITTER_NAME="$AUTHOR_NAME" \
          GIT_COMMITTER_EMAIL="$AUTHOR_EMAIL" \
          git commit -m "chore: bump version for release"

          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Restore Android signing keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Build signed release artifacts
        env:
          ANDROID_KEYSTORE_PATH: app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Rename release outputs with version
        shell: bash
        env:
          VERSION_NAME: ${{ steps.bump_version.outputs.version_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          for apk in app/build/outputs/apk/release/*.apk; do
            mv "$apk" "app/build/outputs/apk/release/freeairradio-${VERSION_NAME}.apk"
          done

          for aab in app/build/outputs/bundle/release/*.aab; do
            mv "$aab" "app/build/outputs/bundle/release/freeairradio-${VERSION_NAME}.aab"
          done

      - name: Push release commit
        env:
          DEFAULT_BRANCH: main
        run: git push origin HEAD:${DEFAULT_BRANCH}

      - name: Start release check on pushed commit
        id: release_check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Android Release',
              head_sha: '${{ steps.release_commit.outputs.commit_sha }}',
              status: 'in_progress',
              output: {
                title: 'Android release in progress',
                summary: 'Building artifacts, tagging the commit, and publishing the GitHub release.'
              }
            });
            core.setOutput('check_run_id', String(data.id));

      - name: Create and push release tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.release_input.outputs.tag_name }}
        run: |
          set -euo pipefail
          git tag "$TAG_NAME"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeairradio-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeairradio-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_input.outputs.tag_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true

      - name: Finalize release check
        if: ${{ always() && steps.release_check.outputs.check_run_id != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success'
              ? 'success'
              : ('${{ job.status }}' === 'cancelled' ? 'cancelled' : 'failure');
            const summary = conclusion === 'success'
              ? 'Release commit pushed, tag created, and GitHub release published successfully.'
              : 'Release workflow failed. Inspect the workflow run logs for details.';

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: Number('${{ steps.release_check.outputs.check_run_id }}'),
              status: 'completed',
              conclusion,
              completed_at: new Date().toISOString(),
              output: {
                title: 'Android Release',
                summary
              }
            });
